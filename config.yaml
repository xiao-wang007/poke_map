scene:
  object_height: 0.05
  l_arm_length: 0.08
  l_thickness: 0.03
  cylinder_radius: 0.05
  l_collision_approximation: convexHull
  cylinder_collision_approximation: convexHull
  num_envs: 128
  env_spacing: 1.8
  envs_root_path: /World/envs
  source_env_name: env_0
  l_object_local_position: [-0.10, -0.06, 0.0]
  cylinder_local_xy: [0.10, 0.02]
  randomize_objects_on_start: true
  randomize_finger_properties_on_start: false
  random_seed: 2
  settle_steps: 10

workspace:
  x_min: -0.4
  x_max: 0.4
  y_min: -0.4
  y_max: 0.4

objects:
  l_position_area_min: [-0.25, -0.25]
  l_position_area_max: [0.25, 0.25]
  cylinder_position_area_min: [-0.25, -0.25]
  cylinder_position_area_max: [0.25, 0.25]
  min_initial_clearance: 0.003
  pose_resample_attempts: 100
  l_yaw_range: [-3.141592653589793, 3.141592653589793]
  cylinder_yaw_range: [-3.141592653589793, 3.141592653589793]

finger:
  local_root_path: FingerRobot
  standalone_root_path: /World/FingerRobot
  sphere_radius: 0.0125
  box_half: 0.008
  limit_lower: [-0.4, -0.4, 0.025]
  limit_upper: [0.4, 0.4, 0.25]
  drive_stiffness: 1500.0
  drive_damping: 180.0
  drive_max_force: 500.0
  default_fingertip_mass: 0.3
  drive_stiffness_range: [1200.0, 1800.0]
  drive_damping_range: [140.0, 220.0]
  fingertip_mass_range: [0.2, 0.5]
  default_xyz: [0.0, 0.0, 0.025]

striker:
  local_path: Striker
  radius: 0.02
  default_z: 0.15
  mass_range: [0.02, 0.10]
  default_color: [1.0, 0.2, 0.2]

control:
  target_seed: null
  num_control_steps: 120       # only used by poke_executor_articulated_vectorized.py (standalone test script)
  arrival_velocity: None
  random_velocity_speed_range: [0.05, 0.20]

training:
  gamma: 0.95
  lr: 0.0003
  batch_size: 128
  buffer_capacity: 100000
  tau: 0.005
  train_after: 1024
  train_every: 1
  grad_updates_per_step: 4

  eps_start: 1.0
  eps_end: 0.05
  eps_decay_episodes: 120
  sigma_start: 0.3
  sigma_end: 0.05

  max_steps_per_episode: 18
  min_active_envs: 5
  c_step: 0.02
  c_success: 10.0
  c_oob: -5.0
  success_threshold: 0.02
  stop_poke_threshold: 0.035

  velocity_max: 1.5
  heuristic_velocity_range: [0.3, 1.0]
  reposition_speed_xy: 1.5    # m/s — constant velocity for XY travel between standoffs
  reposition_speed_z: 0.6     # m/s — constant velocity for Z lift/drop
  safe_z: 0.1                  # m — safe lift height for repositioning
  l_strike: 0.15               # m — total strike travel distance (0.5L behind → 0.5L ahead)
  l_strike_min: 0.05           # m — shortest adaptive strike travel near targets
  strike_control_freq: 60     # Hz — trajectory control frequency
  strike_max_duration: 2.0    # s  — clamp upper bound on strike duration
  strike_min_steps: 3         # minimum trajectory steps
  poke_settle_steps: 5       # physics steps to settle objects after each poke

  yaw_target_mode: preserve
  c_yaw: 0.1
  yaw_reward_enabled: true
  yaw_success_enabled: false
  yaw_threshold_deg: 10.0
  yaw_curriculum_start_ep: 0
  yaw_curriculum_end_ep: 500

  checkpoint_every: 100
  checkpoint_keep: 3

  show_plane_overlay: true
  plane_overlay_thickness: 0.003
  plane_overlay_opacity: 0.18
  show_target_overlay: true
  target_overlay_z_offset: 0.015
  target_overlay_thickness: 0.006
  target_overlay_opacity: 0.2
  show_action_overlay: true
  action_overlay_z_offset: 0.01
